<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter — Add Animal</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    nav a:hover { text-decoration: underline; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
    form { display: grid; gap: 0.5rem; max-width: 480px; margin-top: 1rem; }
    label { font-weight: bold; }
    input, select, textarea { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    button { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
    button:hover { background: #1d4ed8; }
    .back-link { display: inline-block; margin-top: 1rem; color: #2563eb; }
    .error { color: #b00020; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>

  <main>
    <h1>Add a new animal</h1>

    <form th:action="@{/animals}" th:object="${form}" method="post">

      <label for="name">Name</label>
      <input id="name" type="text" th:field="*{name}" placeholder="e.g. Milo">
      <!-- Bonus B -->
      <span class="error" th:errors="*{name}">Name error</span>

      <label for="type">Type</label>
      <select id="type" th:field="*{type}">
        <option value="">— choose —</option>
        <option th:each="t : ${types}" th:value="${t}" th:text="${t}">TYPE</option>
      </select>
      <span class="error" th:errors="*{type}">Type error</span>

      <label for="breed">Breed</label>
      <input id="breed" type="text" th:field="*{breed}" placeholder="e.g. Siamese">

      <label for="age">Age (years)</label>
      <input id="age" type="number" min="0" th:field="*{age}" placeholder="e.g. 3">
      <span class="error" th:errors="*{age}">Age error</span>

      <label for="description">Description</label>
      <textarea id="description" rows="3" th:field="*{description}"
                placeholder="A short description of the animal's personality"></textarea>

      <label for="imageUrl">Image filename</label>
      <input id="imageUrl" type="text" th:field="*{imageUrl}" placeholder="luna.jpg">

      <button type="submit">Add animal</button>
    </form>

    <a href="/animals" class="back-link">← Back to list</a>
  </main>

</body>
</html>
