<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Animals</title>
</head>
<body>
    <main>
        <h1>Available animals</h1>
        <ul>
            <li th:each="animal : ${animals}">
                <span th:text="${animal.name}">Name</span>
                — <span th:text="${animal.type}">Type</span>
                — <span th:text="${animal.status}">Status</span>
            </li>
        </ul>
        <p th:if="${#lists.isEmpty(animals)}">No animals found.</p>
    </main>
</body>
